name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    # Only run on PR comments (not issue comments on non-PRs)
    if: github.event.issue.pull_request || github.event.pull_request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # Remove track_progress - it forces tag mode which expects @claude mentions
          # Use agent mode (automation) instead by providing prompt
          prompt: |
            You are reviewing a pull request for Ahnlich, a high-performance in-memory vector database system written in Rust.
            
            Read the CLAUDE.md file in the repository root for the complete review checklist and guidelines.
            Perform a comprehensive code review following those guidelines.
            
            Post your review using `gh pr comment` with a summary and use inline comments for specific issues.
