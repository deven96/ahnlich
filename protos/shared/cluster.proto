syntax = "proto3";

// Public cluster topology types. Surfaced to client SDKs via the eventual
// `ClusterInfo` query on the public DB and AI services. Standalone (non-
// clustered) servers return a single-entry `ClusterInfoResponse` with
// `role = LEADER` so client code is uniform across deployment modes.
//
// Milestone 1 ships the message definitions only — the query/response variant
// additions to db.query / db.server / ai.query / ai.server land in the
// milestones that actually wire them up (M2 for DB, M4 for AI).
package shared.cluster;

option go_package = "github.com/deven96/ahnlich/sdk/ahnlich-client-go/grpc/shared/cluster;cluster";

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_LEADER = 1;
  NODE_ROLE_FOLLOWER = 2;
  NODE_ROLE_LEARNER = 3;
}

enum NodeHealthStatus {
  NODE_HEALTH_STATUS_UNSPECIFIED = 0;
  NODE_HEALTH_STATUS_HEALTHY = 1;
  NODE_HEALTH_STATUS_UNREACHABLE = 2;
}

message ClusterNode {
  uint64 node_id = 1;
  // Public client-facing service address (`host:port`), the same value the
  // node was started with via `--port`. Clients can connect directly to this
  // address.
  string addr = 2;
  NodeRole role = 3;
  NodeHealthStatus health = 4;
  // Current Raft term as observed by this specific node. Unset when the node
  // is unreachable.
  optional uint64 term = 5;
  // Last committed log index as observed by this specific node. Unset when
  // the node is unreachable.
  optional uint64 commit_index = 6;
}

message ClusterInfoQuery {}

message ClusterInfoResponse {
  repeated ClusterNode nodes = 1;
}
