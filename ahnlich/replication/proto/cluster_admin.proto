syntax = "proto3";

package services.cluster_admin;

// Internal-only cluster administration RPCs used by server-side orchestration
// and the cluster CLI. This API is lifecycle-aware; callers are expected to
// follow the Raft membership flow:
//
// 1. InitCluster
// 2. AddLearner
// 3. ChangeMembership
// 4. RemoveNode
//
// The server validates these invariants and returns:
//
// - INVALID_ARGUMENT for malformed or unknown-node requests
// - FAILED_PRECONDITION when the cluster is not in a state to perform the action

message NodeInfo {
  uint64 id = 1;
  // host:port for Raft RPCs and cluster administration
  string raft_addr = 2;
  // host:port of the public client-facing service
  string service_addr = 3;
}

message InitClusterRequest {
  // Initial voting members for first cluster bootstrap.
  // This should only be called once for a brand-new cluster.
  repeated NodeInfo nodes = 1;
}

message InitClusterResponse {}

message AddLearnerRequest {
  // Adds a non-voting node to Raft replication.
  NodeInfo node = 1;
}

message AddLearnerResponse {}

message ChangeMembershipRequest {
  repeated uint64 node_ids = 1;
}

message ChangeMembershipResponse {}

message RemoveNodeRequest {
  // Removes a node from the current voter set and then from registry tracking.
  uint64 node_id = 1;
}

message RemoveNodeResponse {}

message GetMetricsRequest {}

message GetMetricsResponse {
  // The leader currently known by the responding node, if any.
  optional uint64 leader_id = 1;
  // The Raft term currently observed by the responding node.
  uint64 current_term = 2;
  // Highest applied log index on the responding node, if any log has been applied.
  optional uint64 last_applied_index = 3;
  // Current voter set as observed by the responding node.
  repeated uint64 voter_ids = 4;
  // Full node metadata carried in the responding node's current effective
  // membership view.
  repeated NodeInfo nodes = 5;
}

message GetLeaderRequest {}

message GetLeaderResponse {
  uint64 leader_id = 1;
  string leader_addr = 2;
}

message TriggerSnapshotRequest {}

message TriggerSnapshotResponse {}

service ClusterAdminService {
  rpc InitCluster(InitClusterRequest) returns (InitClusterResponse);
  // Leader-directed. Callers should resolve the current leader first via
  // GetLeader, then send the mutation to that leader's cluster-admin address.
  rpc AddLearner(AddLearnerRequest) returns (AddLearnerResponse);
  // Leader-directed. Every node_id must already be known to the cluster,
  // typically via InitCluster or AddLearner.
  rpc ChangeMembership(ChangeMembershipRequest) returns (ChangeMembershipResponse);
  // Leader-directed. Removes the node from the active voter set and registry
  // tracking after Raft accepts the membership change.
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  rpc GetLeader(GetLeaderRequest) returns (GetLeaderResponse);
  rpc TriggerSnapshot(TriggerSnapshotRequest) returns (TriggerSnapshotResponse);
}
